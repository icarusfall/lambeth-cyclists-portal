<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Lambeth Cyclists{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚲</text></svg>">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="brand" href="/">🚲 Lambeth Cyclists</a>
      {% if user %}
      <nav>
        <a href="/">Home</a>
        <a href="/newsletter">Newsletter</a>
        <a href="/chat">Chat</a>
        <a href="/archive">Archive</a>
        <a href="/account">Account</a>
        <a class="muted" href="/logout">Log out</a>
      </nav>
      {% endif %}
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>Lambeth Cyclists — the Lambeth branch of the London Cycling Campaign</footer>
</body>
</html>
